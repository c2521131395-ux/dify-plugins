        prompt_template:
        - id: 743a2f80-76fc-4fed-9fa1-7340ccad9c5c
          role: system
          text: "You receive a JSON array of row objects (from an Excel-like file).\
            \  \nYou have two tasks:\n1. Split the rows into sequential pages named\
            \ \"Page 1\", \"Page 2\", ...:\n2. Detect the \"quantity\", \"unit\",\
            \ \"unit rate\", and \"total amount ($)\" field, and copy these four keys\
            \ and values for a specific number of time.\n\nRule for the 1st task:\n\
            A new page starts when you find a header-like row. Treat that header row\
            \ as the first row of the new page.\nA header-like row is any row where,\
            \ case-insensitively, one or more of these fields has its header text:\
            \ \"Item\", \"Qty\", \"Unit\", \"Unit Rate\", or \"Total (HK$)\". (E.g.,\
            \ \"Item\", \"ITEM\", \"item\" count as a match.)\nOnce you identified\
            \ a header-like row, whenever the row appear again, you must start a new\
            \ page.\nIf the input begins with non-header rows, include them in \"\
            Page 1\".\nKeep the original row order and do not change row objects (no\
            \ added/removed fields or value changes).\n\nRule for the 2nd task:\n\
            Detect the key of the JSON array representing \"quantity\", \"unit\",\
            \ \"unit rate\", and \"total amount ($)\" firstly.\nMake sure the number\
            \ of set of \"quantity\", \"unit\", \"unit rate\", and \"total amount\
            \ ($)\" keys in the result is equal to the number given.\nDo not change\
            \ the key name, keep them as original.\nE.g. If the number given is 1,\
            \ then no need to do the 2nd class. If the umber given is 2, copy the\
            \ four keys one time. If the umber given is 3, copy the four keys two\
            \ times.\nDo not delete any row, even if all the values are null.\n\n\
            Output a single JSON object whose keys are \"Page 1\", \"Page 2\", ...\
            \ and whose values are arrays of the original row objects.\nReturn only\
            \ valid JSON (no extra text).\n\nExample of input:\nNumber given: 3\n\
            JSON array received:\n[{\"Item\":null,\"Unnamed: 1\":null,\"Unnamed: 2\"\
            :null,\"Qty\":null,\"Unit\":null,\"Unit Rate\":null,\"Total (HK$)\":null},{\"\
            Item\":\"Item\",\"Unnamed: 1\":null,\"Unnamed: 2\":null,\"Qty\":\"Qty\"\
            ,\"Unit\":\"Unit\",\"Unit Rate\":\"Unit Rate\",\"Total (HK$)\":\"Total\
            \ (HK$)\"},{\"Item\":null,\"Unnamed: 1\":null,\"Unnamed: 2\":null,\"Qty\"\
            :null,\"Unit\":null,\"Unit Rate\":null,\"Total (HK$)\":null}]\nThen, the\
            \ output should be:\n{Page 1: [{\"Item\":null,\"Unnamed: 1\":null,\"Unnamed:\
            \ 2\":null,\"Qty\":null,\"Unit\":null,\"Unit Rate\":null,\"Total (HK$)\"\
            :null, \"Qty\":null,\"Unit\":null,\"Unit Rate\":null,\"Total (HK$)\":null,\
            \ \"Qty\":null,\"Unit\":null,\"Unit Rate\":null,\"Total (HK$)\":null}],{Page\
            \ 2: [{\"Item\":\"Item\",\"Unnamed: 1\":null,\"Unnamed: 2\":null,\"Qty\"\
            :\"Qty\",\"Unit\":\"Unit\",\"Unit Rate\":\"Unit Rate\",\"Total (HK$)\"\
            :\"Total (HK$)\",\"Qty\":\"Qty\",\"Unit\":\"Unit\",\"Unit Rate\":\"Unit\
            \ Rate\",\"Total (HK$)\":\"Total (HK$)\",\"Qty\":\"Qty\",\"Unit\":\"Unit\"\
            ,\"Unit Rate\":\"Unit Rate\",\"Total (HK$)\":\"Total (HK$)\"},{\"Item\"\
            :null,\"Unnamed: 1\":null,\"Unnamed: 2\":null,\"Qty\":null,\"Unit\":null,\"\
            Unit Rate\":null,\"Total (HK$)\":null,\"Qty\":null,\"Unit\":null,\"Unit\
            \ Rate\":null,\"Total (HK$)\":null,\"Qty\":null,\"Unit\":null,\"Unit Rate\"\
            :null,\"Total (HK$)\":null}]}"
