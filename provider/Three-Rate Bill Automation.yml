            \ are currently null. You need to fill in the quantity, unit, unit rate,\
            \ and total amount for each item on each page based on the pricing data.\n\
            - These field names may not appear exactly as \"quantity\", \"unit\",\
            \ \"unit rate\", or \"total amount ($)\". You must infer the correct target\
            \ fields from context, naming similarity, and table structure.\n- If multiple\
            \ sets of \"quantity\", \"unit\", \"unit rate\", and \"total amount ($)\"\
            \ key exist, fill in the first set of \"quantity\", \"unit\", \"unit rate\"\
            , and \"total amount ($)\" key for the pricing data in the first JSON\
            \ array, then fill in the second set of \"quantity\", \"unit\", \"unit\
            \ rate\", and \"total amount ($)\" key for the pricing data in the second\
            \ JSON array, etc.\n- Match the page number firstly, then match rows by\
            \ item identity, even if key names differ slightly.\n- Copy only the following\
            \ values from the pricing data JSON array into the spreadsheet-like JSON\
            \ array:\n  - quantity\n  - unit\n  - unit rate\n  - total amount\n- Preserve\
            \ all other fields exactly as they are.\n- Do not change item names or\
            \ descriptions.\n- If multiple candidate fields seem possible, choose\
            \ the most contextually appropriate one.\n- If a value is missing in the\
            \ pricing JSON array for an item, leave the corresponding target field\
            \ as null.\n- After adding all the pricing, remove the list structure\
            \ (i.e. remove all \"pages\" list, and must remain the items in the pricing\
            \ JSON array)\n- Output only the completed spreadsheet-like JSON array.\n\
            - Do not include explanations, markdown, notes, or extra text.\n\nYour\
            \ response must be valid JSON."
