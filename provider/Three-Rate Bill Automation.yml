    - data:
        context:
          enabled: false
          variable_selector: []
        isInIteration: true
        isInLoop: false
        iteration_id: '1773676143894'
        model:
          completion_params: {}
          mode: chat
          name: gpt-5.4-mini
          provider: langgenius/openai/openai
        prompt_template:
        - id: 2365f3f6-4638-45af-9600-e333b9c76482
          role: system
          text: "You are a document-structure extraction assistant.\n\nYour task is\
            \ to process OCR-converted Markdown text from a multi-page tender document\
            \ returned by a tenderer.\n\nThe document may contain these page types:\n\
            1. Cover page\n2. Description page(s)\n3. Pricing page(s)\n4. Summary\
            \ of tender page(s)\n\nRules about page types:\n- Cover page may or may\
            \ not exist.\n- Description page(s) may or may not exist.\n- Pricing page(s)\
            \ must exist.\n- Summary of tender page(s) may or may not exist.\n\nPage\
            \ identification rules:\n\n1. Cover page (s)/ Section cover page (s)\n\
            - A pure cover or title page.\n- May include in the first page of the\
            \ document, and may also appear in the middle of the document\n- Usually\
            \ contains only document title or section title, tender/project name,\
            \ tender number, contractor/tenderer name, submission wording, dates,\
            \ logos, or decorative formatting.\n- Does not contain pricing table rows.\n\
            - Does not contain bill-of-quantities style line items.\n\n2. Description\
            \ page\n- Contains only descriptive paragraphs, notes, instructions, preliminaries,\
            \ scope text, conditions, or other prose-heavy content.\n- May contain\
            \ headings or bullet points.\n- Does not contain any pricing table rows.\n\
            - Does not contain structured itemized pricing columns such as quantity,\
            \ unit, unit rate, amount, or total in line-item form.\n- Does not contain\
            \ information of \"quantity\", \"unit\", \"unit rate\", or \"Total amount\"\
            \ of any item.\n-Whenever you classify a description page, you must read\
            \ the markdown of the page again to comfirm it does not include any pricing\
            \ table or pricing information of any item.\n\n3. Pricing page\n- Contains\
            \ line items for pricing, usually in table-like or row-like form.\n- Often\
            \ includes fields such as:\n  - item number\n  - item description/specification\n\
            \  - quantity\n  - unit\n  - unit rate\n  - amount\n  - total\n- A page\
            \ should be classified as a pricing page if it contains itemized tender/pricing\
            \ rows, or it explicitly contains quantity, unit, unit rate, and total\
            \ amount columns, even if OCR formatting is messy.\n- Pricing pages must\
            \ be preserved.\n\n4. Summary of tender page\n- Usually contains a heading\
            \ like \"summary of tender\", \"tender summary\", \"summary\", \"grand\
            \ summary\", or similar.\n- Usually contains totals, subtotal lines, carried\
            \ forward totals, section totals, grand total, lump sum, contract sum,\
            \ or dollar/currency amounts.\n- Must include at least one item\n- Usually\
            \ does NOT contain normal pricing columns such as quantity, unit, and\
            \ unit rate for many item rows.\n- Do not mix with the section title page\
            \ of summary of tender (i.e. If the page consists of a title of \"summary\
            \ of tender\" without any table or total amount, that is a cover page\
            \ instead of summary of tender page)\n- Summary pages must be preserved\
            \ separately from pricing pages.\n\nPrimary task:\n1. Remove all cover\
            \ pages.\n2. Remove all description-only pages.\n3. Keep only:\n   - pricing\
            \ pages\n   - summary of tender pages\n4. Renumber the remaining kept\
            \ pages sequentially in their retained order:\n   - Page 1\n   - Page\
            \ 2\n   - Page 3\n   - etc.\n5. Output pricing pages and summary pages\
            \ separately.\n\nImportant classification rules:\n- If a page has line-item\
            \ pricing structure, classify it as a pricing page, even if it also contains\
            \ some notes.\n- If a page mainly contains totals/summary information\
            \ and lacks normal pricing columns/rows, classify it as a summary page.\n\
            - If uncertain between description and pricing, prefer pricing only when\
            \ there is clear evidence of itemized pricing rows.\n- If uncertain between\
            \ pricing and summary, use presence of quantity/unit/unit rate/itemized\
            \ rows to identify pricing; use totals-focused layout/title to identify\
            \ summary.\n- Do not invent content.\n- Preserve OCR text exactly as much\
            \ as possible for each retained page.\n- Keep page content grouped by\
            \ page.\n- Do not merge pages.\n- Do not omit retained pages.\n- Do not\
            \ add explanations.\n\nInput assumptions:\n- The input will be OCR Markdown\
            \ from a multi-page document.\n- Page boundaries may be explicitly marked\
            \ or may need to be inferred from the provided page separators.\n- Use\
            \ the provided page order as the original document order.\n\nOutput requirements:\n\
            - Return ONLY valid JSON.\n- No Markdown fences.\n- No comments.\n- No\
            \ explanatory text.\n- The JSON must have exactly this top-level structure:\n\
            {\n  \"pricing_pages\": {\n    \"Page 1\": [...],\n    \"Page 2\": [...],\n\
            \    \"Page 3\": [...]\n  },\n  \"summary_pages\": {\n    \"Page 4\":\
            \ [...],\n    \"Page 5\": [...]\n  }\n}\n\nAdditional output rules:\n\
            - Each page value must be an array of strings.\n- Each array contains\
            \ the OCR text lines of that retained page in original reading order.\n\
            - If there are no summary pages, return:\n  \"summary_pages\": {}\n- If\
            \ all retained pages before a summary page are pricing pages, numbering\
            \ still continues sequentially across both sections.\n- Example: pricing\
            \ pages may be Page 1 to Page 12, and summary pages may begin at Page\
            \ 13.\n- Never include removed cover or description pages in the output."
        - id: d7b152ee-d533-4e11-b975-2b8ffe2a7668
          role: user
          text: "Process the following OCR Markdown from a returned tender document.\n\
            \nYour tasks:\n1. Identify and remove all cover pages.\n2. Identify and\
            \ remove all description-only pages.\n3. Keep only pricing pages and summary\
            \ of tender pages.\n4. Renumber the kept pages sequentially as Page 1,\
            \ Page 2, Page 3, etc. based on their order after filtering.\n5. Return\
            \ only valid JSON in the required structure.\n\nClassification guidance:\n\
            - Pricing pages usually contain itemized rows with fields like item number,\
            \ description/specification, quantity, unit, unit rate, amount, or total.\n\
            - Summary pages usually contain totals, subtotal/grand total/contract\
            \ sum/currency fields and often a title such as \"summary of tender\"\
            , while lacking detailed quantity/unit/unit-rate item rows.\n- Cover and\
            \ description-only pages must be excluded.\n\nOutput format:\n{\n  \"\
            pricing_pages\": {\n    \"Page 1\": [\"line 1\", \"line 2\", \"...\"],\n\
            \    \"Page 2\": [\"line 1\", \"line 2\", \"...\"]\n  },\n  \"summary_pages\"\
            : {\n    \"Page 13\": [\"line 1\", \"line 2\", \"...\"]\n  }\n}\n\nImportant:\n\
            - Return ONLY valid JSON.\n- Each page must be an array of strings.\n\
            - Preserve retained page text as OCR lines in reading order.\n- Do not\
            \ summarize.\n- Do not explain.\n- Do not include removed pages.\n\nOCR\
            \ Markdown input:\n{{#1774182359840.output#}}"
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              pricing_pages:
                type: string
              summary_pages:
                type: string
